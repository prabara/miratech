<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <defs>
    <!-- Primary Gradient (0066FF to 4F9DFF) -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#4F9DFF" />
    </linearGradient>
    
    <!-- Accent Gradient (4F9DFF to White/Secondary) -->
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A2540" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>
  </defs>

  <!-- M Logo Icon (Left Side) -->
  <g transform="translate(10, 10)">
    <!-- Main Left Stem -->
    <path d="M5 50 L5 10 L25 35 L45 10 L45 50" stroke="url(#primary-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Glowing Accent overlay for futuristic feel -->
    <path d="M15 50 L15 22.5 L25 35 L35 22.5 L35 50" stroke="#4F9DFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <!-- Tech node dots -->
    <circle cx="25" cy="35" r="3.5" fill="#FFFFFF" stroke="#0066FF" stroke-width="2" />
    <circle cx="5" cy="10" r="3" fill="#4F9DFF" />
    <circle cx="45" cy="10" r="3" fill="#4F9DFF" />
  </g>

  <!-- Brand Typography -->
  <text x="80" y="48" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="24" font-weight="800" fill="currentColor" class="logo-text" letter-spacing="2">MIRATECH</text>
  <text x="80" y="62" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="currentColor" class="logo-subtext" opacity="0.7" letter-spacing="3.5">TECHNOLOGY</text>
</svg>
